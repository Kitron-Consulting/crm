name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create/update releases

jobs:
  linux:
    # Build inside manylinux_2_28 so the resulting binary works on any
    # glibc 2.28+ system (Ubuntu 20.04+, Debian 11+, RHEL 8+, etc).
    # ubuntu-latest's glibc 2.39 would otherwise lock out older targets.
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: /opt/python/cp312-cp312/bin/python -m pip install pyinstaller boto3

      - name: Generate version file from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '__version__ = "%s"\n' "$VERSION" > crm/_version.py

      - name: Build binary
        run: |
          /opt/python/cp312-cp312/bin/python -m PyInstaller --onefile --name crm \
            --collect-all boto3 \
            --collect-all botocore \
            crm_entry.py

      - name: Rename for release
        run: mv dist/crm dist/crm-linux-x86_64

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/crm-linux-x86_64

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install build deps
        run: pip install pyinstaller boto3

      - name: Generate version file from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '__version__ = "%s"\n' "$VERSION" > crm/_version.py

      - name: Build binary
        run: |
          pyinstaller --onefile --name crm \
            --collect-all boto3 \
            --collect-all botocore \
            crm_entry.py

      - name: Rename for release
        run: mv dist/crm dist/crm-macos-arm64

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/crm-macos-arm64
