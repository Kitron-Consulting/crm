name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create/update releases

jobs:
  linux:
    # Build inside python:3.12-bullseye (Debian 11, glibc 2.31) so the
    # binary runs on Ubuntu 20.04+, Debian 11+, and any system with glibc
    # >= 2.31. ubuntu-latest's glibc 2.39 would otherwise lock out older
    # targets, and manylinux's Python is built static-only (no shared
    # libpython), which PyInstaller needs.
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: pip install pyinstaller boto3

      - name: Generate version file from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '__version__ = "%s"\n' "$VERSION" > crm/_version.py

      - name: Build binary
        run: |
          pyinstaller --onefile --name crm \
            --collect-all boto3 \
            --collect-all botocore \
            crm_entry.py

      - name: Rename for release
        run: mv dist/crm dist/crm-linux-x86_64

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/crm-linux-x86_64

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install build deps
        run: pip install pyinstaller boto3

      - name: Generate version file from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          printf '__version__ = "%s"\n' "$VERSION" > crm/_version.py

      - name: Build binary
        run: |
          pyinstaller --onefile --name crm \
            --collect-all boto3 \
            --collect-all botocore \
            crm_entry.py

      - name: Rename for release
        run: mv dist/crm dist/crm-macos-arm64

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/crm-macos-arm64
