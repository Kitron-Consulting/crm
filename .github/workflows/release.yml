name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create/update releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: crm-linux-x86_64
          - os: macos-latest
            asset: crm-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install build deps
        run: pip install pyinstaller boto3

      - name: Build binary
        run: |
          pyinstaller --onefile --name crm \
            --collect-all boto3 \
            --collect-all botocore \
            crm_entry.py

      - name: Rename for release
        run: mv dist/crm dist/${{ matrix.asset }}

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
