name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Check for undefined names
        run: ruff check --select F821 crm

  linux:
    needs: lint
    runs-on: ubuntu-latest
    # python:3.12-bullseye = Debian 11, glibc 2.31. PyApp's Rust binary
    # links against the build-host glibc; building here means the binary
    # runs on any glibc 2.31+ system. python-build-standalone (bundled
    # by PyApp at runtime) is independently glibc 2.17-compatible.
    container: python:3.12-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs reads from git history

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Build PyApp binary
        env:
          PYAPP_PROJECT_NAME: crm
          PYAPP_EXEC_SPEC: crm.cli:main
          PYAPP_PYTHON_VERSION: "3.12"
          PYAPP_DISTRIBUTION_EMBED: "true"
          PYAPP_FULL_ISOLATION: "true"
        run: |
          WHEEL=$(ls dist/crm-*.whl | head -1)
          export PYAPP_PROJECT_VERSION=$(basename "$WHEEL" | sed -E 's/^crm-(.+)-py3-none-any\.whl$/\1/')
          export PYAPP_PROJECT_PATH="$PWD/$WHEEL"
          cargo install pyapp --force --root .pyapp-build
          mv .pyapp-build/bin/pyapp dist/crm-linux-x86_64

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/crm-linux-x86_64

  macos:
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Build PyApp binary
        env:
          PYAPP_PROJECT_NAME: crm
          PYAPP_EXEC_SPEC: crm.cli:main
          PYAPP_PYTHON_VERSION: "3.12"
          PYAPP_DISTRIBUTION_EMBED: "true"
          PYAPP_FULL_ISOLATION: "true"
        run: |
          WHEEL=$(ls dist/crm-*.whl | head -1)
          export PYAPP_PROJECT_VERSION=$(basename "$WHEEL" | sed -E 's/^crm-(.+)-py3-none-any\.whl$/\1/')
          export PYAPP_PROJECT_PATH="$PWD/$WHEEL"
          cargo install pyapp --force --root .pyapp-build
          mv .pyapp-build/bin/pyapp dist/crm-macos-arm64

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/crm-macos-arm64
